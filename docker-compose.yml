services:
  ## PostgreSQL Source - для исходных данных
  postgres-source:
    image: postgres:14
    container_name: postgres_source
    volumes:
      - ./mnt/postgres/source:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: "admin"
      POSTGRES_USER: "admin"
      POSTGRES_PASSWORD: "admin"
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ## PostgreSQL Target - для целевых данных
  postgres-target:
    image: postgres:14
    container_name: postgres_target
    volumes:
      - ./mnt/postgres/target:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: "admin"
      POSTGRES_USER: "admin"
      POSTGRES_PASSWORD: "admin"
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ## MinIO Object Storage
  minio:
    container_name: minio
    image: minio/minio:RELEASE.2024-05-10T01-41-38Z
    volumes:
      - ./mnt/minio:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      AWS_REGION: us-east-1
    entrypoint: >
      /bin/sh -c "
      minio server /data --console-address ':9001' &
      sleep 5;
      mc alias set minio http://minio:9000 minioadmin minioadmin;
      mc mb minio/data --ignore-existing;
      mc mb minio/iceberg-warehouse --ignore-existing;
      mc mb minio/warehouse --ignore-existing;
      tail -f /dev/null"
    restart: on-failure

  ## Hadoop
  namenode:
    image: amhhaggag/hadoop-base-3.1.1:1.1
    restart: on-failure
    container_name: namenode
    logging:
      driver: "json-file"
      options:
        max-file: "5"
        max-size: "10m"
    ports:
      - "9870:9870"
    volumes:
      - ./mnt/hadoop/namenode:/hadoop/dfs/name
    environment:
      - CLUSTER_NAME=hadoop_cluster
      - HDFS_CONF_dfs_namenode_name_dir=file:///hadoop/dfs/name
    command: "/opt/hadoop/bin/hdfs --config /etc/hadoop namenode"
    healthcheck:
      test: [ "CMD", "nc", "-z", "namenode", "9870" ]
      timeout: 45s
      interval: 10s
      retries: 10

  datanode:
    image: amhhaggag/hadoop-base-3.1.1:1.1
    restart: on-failure
    container_name: datanode
    logging:
      driver: "json-file"
      options:
        max-file: "5"
        max-size: "10m"
    depends_on:
      - namenode
    volumes:
      - ./mnt/hadoop/datanode:/hadoop/dfs/data
    environment:
      - SERVICE_PRECONDITION=namenode:9870
    command: "/opt/hadoop/bin/hdfs --config /etc/hadoop datanode"
    healthcheck:
      test: [ "CMD", "nc", "-z", "datanode", "9864" ]
      timeout: 45s
      interval: 10s
      retries: 10

  nodemanager:
    image: amhhaggag/hadoop-base-3.1.1:1.1
    restart: on-failure
    container_name: nodemanager
    depends_on:
      - namenode
    ports:
      - "8042:8042"
    command: "/opt/hadoop/bin/yarn --config /etc/hadoop nodemanager"

  resourcemanager:
    image: amhhaggag/hadoop-base-3.1.1:1.1
    restart: on-failure
    container_name: resourcemanager
    depends_on:
      - namenode
    ports:
      - "8088:8088"
    command: "/opt/hadoop/bin/yarn --config /etc/hadoop resourcemanager"

  historyserver:
    image: amhhaggag/hadoop-base-3.1.1:1.1
    restart: on-failure
    container_name: historyserver
    depends_on:
      - namenode
    command: "/opt/hadoop/bin/yarn --config /etc/hadoop historyserver"

  ## Hive
  hive-metastore:
    image: amhhaggag/hive-base-3.1.2:1.1
    restart: on-failure
    container_name: hive-metastore
    logging:
      driver: "json-file"
      options:
        max-file: "5"
        max-size: "10m"
    depends_on:
      postgres-source:
        condition: service_healthy
      namenode:
        condition: service_healthy
      datanode:
        condition: service_healthy
    environment:
      - SERVICE_PRECONDITION=namenode:9870 datanode:9864 postgres-source:5432
    ports:
      - "9083:9083"
    command: "/opt/start-metastore.sh"
    healthcheck:
      test: [ "CMD", "nc", "-z", "hive-metastore", "9083" ]
      timeout: 45s
      interval: 10s
      retries: 10

  hive-server:
    image: amhhaggag/hive-base-3.1.2:1.1
    restart: on-failure
    container_name: hive-server
    logging:
      driver: "json-file"
      options:
        max-file: "5"
        max-size: "10m"
    depends_on:
      - hive-metastore
      - nodemanager
      - resourcemanager
      - historyserver
    environment:
      - SERVICE_PRECONDITION=hive-metastore:9083
    ports:
      - "10000:10000"
      - "10002:10002"
    command: "/opt/start-server.sh"
    healthcheck:
      test: [ "CMD", "nc", "-z", "hive-server", "10002" ]
      timeout: 45s
      interval: 10s
      retries: 10

  ## Spark
  spark-master:
    image: amhhaggag/spark-3.5.1:1.1
    container_name: spark-master
    hostname: spark-master
    ports:
      - "7080:8080"
      - "7077:7077"
    command: org.apache.spark.deploy.master.Master
    environment:
      - SPARK_MASTER_HOST=spark-master

  spark-worker:
    image: amhhaggag/spark-3.5.1:1.1
    container_name: spark-worker-1
    hostname: spark-worker-1
    depends_on:
      - spark-master
    ports:
      - "7081:8081"
    command: org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_MASTER=spark://spark-master:7077

  ## Airflow (использует свой PostgreSQL)
  airflow-db:
    image: postgres:14
    container_name: airflow-db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow_pwd
      POSTGRES_DB: airflow_db
    ports:
      - "5532:5432"
    volumes:
      - ./mnt/airflow/postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow:
    image: amhhaggag/airflow-2.6.3:1.0
    container_name: airflow
    environment:
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow_pwd@airflow-db:5432/airflow_db
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    ports:
      - "8090:8080"
    depends_on:
      airflow-db:
        condition: service_healthy
    volumes:
      - ./mnt/airflow/dags:/opt/airflow/dags

  ## Trino
  trino:
    image: amhhaggag/trino-450:1.1
    restart: on-failure
    container_name: trino
    ports:
      - "8082:8080"
    environment:
      - TRINO_VERSION=450
    entrypoint: ["/opt/trino/bin/entrypoint.sh"]

  ## Kafka
  kafka:
    image: confluentinc/cp-kafka:7.4.3
    container_name: kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT'
      KAFKA_LISTENERS: 'INTERNAL://kafka:29092,CONTROLLER://kafka:29093,EXTERNAL://0.0.0.0:9092'
      KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://kafka:29092,EXTERNAL://localhost:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      CLUSTER_ID: 'ciWo7IWazngRchmPES6q5B=='
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'

  schema-registry:
    image: confluentinc/cp-schema-registry:7.4.3
    container_name: schema-registry
    hostname: schema-registry
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: 'kafka:29092'
      SCHEMA_REGISTRY_LISTENERS: 'http://0.0.0.0:8081'
    depends_on:
      - kafka

  ## Conduktor (использует свой PostgreSQL)
  conduktor-postgresql:
    image: postgres:14
    container_name: conduktor-postgresql
    hostname: conduktor-postgresql
    volumes:
      - pg_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: "conduktor-console"
      POSTGRES_USER: "conduktor"
      POSTGRES_PASSWORD: "change_me"
      POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conduktor"]
      interval: 10s
      timeout: 5s
      retries: 5

  conduktor-console:
    image: conduktor/conduktor-console:1.27.0
    container_name: conduktor-console
    depends_on:
      conduktor-postgresql:
        condition: service_healthy
    ports:
      - "9980:8080"
    volumes:
      - conduktor_data:/var/conduktor
    environment:
      CDK_DATABASE_URL: "postgresql://conduktor:change_me@conduktor-postgresql:5432/conduktor-console"
      CDK_MONITORING_CORTEX-URL: http://conduktor-monitoring:9009/
      CDK_MONITORING_ALERT-MANAGER-URL: http://conduktor-monitoring:9010/
      CDK_MONITORING_CALLBACK-URL: http://conduktor-platform:8080/monitoring/api/
      CDK_MONITORING_NOTIFICATIONS-CALLBACK-URL: http://localhost:8080

  conduktor-monitoring:
    image: conduktor/conduktor-console-cortex:1.27.0
    container_name: conduktor-monitoring
    environment:
      CDK_CONSOLE-URL: "http://conduktor-console:8080"

  ## NiFi
  nifi-zookeeper:
    hostname: nifi-zookeeper
    container_name: nifi-zookeeper
    image: 'bitnami/zookeeper:3.7.2'
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    restart: on-failure

  nifi:
    hostname: apache-nifi
    container_name: nifi
    image: 'apache/nifi:1.23.2'
    ports:
      - '8060:8060'
    environment:
      - NIFI_WEB_HTTP_PORT=8060
      - NIFI_CLUSTER_IS_NODE=true
      - NIFI_CLUSTER_NODE_PROTOCOL_PORT=8082
      - NIFI_ZK_CONNECT_STRING=nifi-zookeeper:2181
      - NIFI_ELECTION_MAX_WAIT=30 sec
      - NIFI_SENSITIVE_PROPS_KEY='12345678901234567890A'
    volumes:
      - nifi-database_repository:/opt/nifi/nifi-current/database_repository
      - nifi-flowfile_repository:/opt/nifi/nifi-current/flowfile_repository
      - nifi-content_repository:/opt/nifi/nifi-current/content_repository
      - nifi-provenance_repository:/opt/nifi/nifi-current/provenance_repository
      - nifi-state:/opt/nifi/nifi-current/state
      - nifi-logs:/opt/nifi/nifi-current/logs
      - nifi-conf:/opt/nifi/nifi-current/conf
    restart: on-failure
    depends_on:
      - nifi-zookeeper

  ## Flink
  jobmanager:
    image: amhhaggag/flink-1.20.0:1.0
    hostname: jobmanager
    container_name: flink-jobmanager
    environment:
      - JOB_MANAGER_RPC_ADDRESS=jobmanager
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
    ports:
      - "9091:8081"
    command: jobmanager

  taskmanager:
    image: amhhaggag/flink-1.20.0:1.0
    container_name: flink-taskmanager
    depends_on:
      - jobmanager
    environment:
      - JOB_MANAGER_RPC_ADDRESS=jobmanager
      - TASK_MANAGER_NUMBER_OF_TASK_SLOTS=2
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
    command: taskmanager

  ## Nessie Catalog for Iceberg Tables (использует postgres-source)
  nessie-init:
    image: postgres:14
    depends_on:
      postgres-source:
        condition: service_healthy
    command: >
      bash -c """
      until pg_isready -h postgres-source -p 5432; do sleep 2; done;
      psql -h postgres-source -U admin -d admin -c 'CREATE DATABASE nessie;';
      psql -h postgres-source -U admin -d admin -c \"DO \\$\\$ BEGIN IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'nessie') THEN CREATE USER nessie WITH PASSWORD 'nessie'; END IF; END \\$\\$;\";
      psql -h postgres-source -U admin -d admin -c 'GRANT ALL PRIVILEGES ON DATABASE nessie TO nessie;'
      """
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      PGPASSWORD: admin

  nessie:
    image: ghcr.io/projectnessie/nessie:0.99.0
    container_name: nessie
    environment:
      - QUARKUS_PROFILE=prod
      - QUARKUS_HTTP_PORT=19120
      - QUARKUS_LOG_CONSOLE_FORMAT=%d{yyyy-MM-dd HH:mm:ss} %-5p [%c{1.}] (%t) %s%e%n
      - QUARKUS_LOG_LEVEL=DEBUG
      - nessie.version.store.type=JDBC
      - nessie.version.store.persist.jdbc.datasource=postgresql
      - quarkus.datasource.postgresql.jdbc.url=jdbc:postgresql://postgres-source:5432/nessie
      - quarkus.datasource.postgresql.username=nessie
      - quarkus.datasource.postgresql.password=nessie
      - nessie.server.authentication.enabled=false
      - nessie.catalog.default-warehouse=warehouse
      - nessie.catalog.warehouses.warehouse.location=s3://warehouse/
      - nessie.catalog.service.s3.default-options.region=us-east-1
      - nessie.catalog.service.s3.default-options.path-style-access=true
      - nessie.catalog.service.s3.default-options.access-key=urn:nessie-secret:quarkus:nessie.catalog.secrets.access-key
      - nessie.catalog.secrets.access-key.name=minioadmin
      - nessie.catalog.secrets.access-key.secret=minioadmin
      - nessie.catalog.service.s3.default-options.endpoint=http://minio:9000/
    volumes:
      - ./mnt/nessie-data:/nessie/data
    ports:
      - "19120:19120"
    depends_on:
      nessie-init:
        condition: service_completed_successfully
      postgres-source:
        condition: service_healthy

volumes:
  pg_data: {}
  conduktor_data: {}
  nifi-database_repository: {}
  nifi-content_repository: {}
  nifi-flowfile_repository: {}
  nifi-provenance_repository: {}
  nifi-state: {}
  nifi-logs: {}
  nifi-conf: {}

networks:
  default:
    name: bes-network
